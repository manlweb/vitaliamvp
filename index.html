<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Encuesta para Asesores</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    padding:40px;
}

.container{
    max-width:750px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:15px;
    color:#222;
}

.descripcion{
    text-align:center;
    margin-bottom:30px;
    color:#555;
    line-height:1.6;
}

label{
    display:block;
    margin-top:20px;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

input,
select,
textarea{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:15px;
}

textarea{
    resize:vertical;
}

.checkbox-group{
    margin-top:10px;
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    background:#fafafa;
}

.checkbox-group label{
    display:flex;
    align-items:center;
    gap:10px;
    margin:10px 0;
    font-weight:normal;
}

.checkbox-group input[type="checkbox"]{
    width:auto;
}

button{
    width:100%;
    margin-top:30px;
    padding:16px;
    border:none;
    border-radius:10px;
    background:#007BFF;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
}

#mensaje{
    margin-top:25px;
    text-align:center;
    font-weight:bold;
    font-size:16px;
}

</style>
</head>

<body>

<div class="container">

<h1>Encuesta para Asesores</h1>

<p class="descripcion">
Queremos entender los retos reales de los asesores
para desarrollar mejores herramientas de prospección,
seguimiento y organización.
</p>

<form id="formulario">

<label>Nombre</label>
<input type="text" id="nombre" required>

<label>¿Cuánto tiempo llevas como asesor?</label>

<select id="tiempoComoAsesor" required>
    <option value="">Selecciona una opción</option>
    <option>Menos de 6 meses</option>
    <option>6 meses a 1 año</option>
    <option>1 a 3 años</option>
    <option>Más de 3 años</option>
</select>

<label>¿Cuál es tu mayor problema actualmente?</label>

<div class="checkbox-group">

<label>
<input type="checkbox" name="mayorProblema" value="Conseguir prospectos">
Conseguir prospectos
</label>

<label>
<input type="checkbox" name="mayorProblema" value="Dar seguimiento">
Dar seguimiento
</label>

<label>
<input type="checkbox" name="mayorProblema" value="Organizar clientes">
Organizar clientes
</label>

<label>
<input type="checkbox" name="mayorProblema" value="Hablar con prospectos">
Hablar con prospectos
</label>

<label>
<input type="checkbox" name="mayorProblema" value="Cerrar ventas">
Cerrar ventas
</label>

<label>
<input type="checkbox" name="mayorProblema" value="Mantener constancia">
Mantener constancia
</label>

</div>

<label>¿Qué pasó después de terminar tu Proyecto 200?</label>

<select id="quePasoProyecto200" required>
    <option value="">Selecciona una opción</option>
    <option>Me quedé sin prospectos</option>
    <option>No supe qué hacer después</option>
    <option>Perdí seguimiento</option>
    <option>Conseguí más clientes</option>
    <option>Dejé de prospectar</option>
</select>

<label>¿Qué herramientas usas actualmente?</label>

<div class="checkbox-group">

<label>
<input type="checkbox" name="herramientaActual" value="Excel">
Excel
</label>

<label>
<input type="checkbox" name="herramientaActual" value="WhatsApp">
WhatsApp
</label>

<label>
<input type="checkbox" name="herramientaActual" value="Libreta">
Libreta
</label>

<label>
<input type="checkbox" name="herramientaActual" value="CRM">
CRM
</label>

<label>
<input type="checkbox" name="herramientaActual" value="Ninguna">
Ninguna
</label>

</div>

<label>¿Qué herramientas te ayudarían más?</label>

<div class="checkbox-group">

<label>
<input type="checkbox" name="herramientaDeseada" value="Recordatorios automáticos">
Recordatorios automáticos
</label>

<label>
<input type="checkbox" name="herramientaDeseada" value="Ideas para conseguir prospectos">
Ideas para conseguir prospectos
</label>

<label>
<input type="checkbox" name="herramientaDeseada" value="Seguimiento automático">
Seguimiento automático
</label>

<label>
<input type="checkbox" name="herramientaDeseada" value="Panel de clientes">
Panel de clientes
</label>

<label>
<input type="checkbox" name="herramientaDeseada" value="Automatización de WhatsApp">
Automatización de WhatsApp
</label>

<label>
<input type="checkbox" name="herramientaDeseada" value="Capacitación práctica">
Capacitación práctica
</label>

</div>

<label>Comentarios adicionales</label>

<textarea id="comentarios" rows="5"></textarea>

<button type="submit">
Enviar Respuestas
</button>

</form>

<div id="mensaje"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxpsLr5_qs2l1q3KH3xtcx1PzBWsRmJfTH1yXl1XuTBTmVLqNGV56xHbiqkdOhIQiuh/exec";

document.getElementById("formulario")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const boton = document.querySelector("button");

    boton.disabled = true;
    boton.innerText = "Enviando...";

    const data = {

        nombre: document.getElementById("nombre").value,

        tiempoComoAsesor:
        document.getElementById("tiempoComoAsesor").value,

        mayorProblema: Array.from(
        document.querySelectorAll('input[name="mayorProblema"]:checked')
        ).map(el => el.value).join(", "),

        quePasoProyecto200:
        document.getElementById("quePasoProyecto200").value,

        herramientaActual: Array.from(
        document.querySelectorAll('input[name="herramientaActual"]:checked')
        ).map(el => el.value).join(", "),

        herramientaDeseada: Array.from(
        document.querySelectorAll('input[name="herramientaDeseada"]:checked')
        ).map(el => el.value).join(", "),

        comentarios:
        document.getElementById("comentarios").value
    };

    try{

        const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify(data)
        });

        const result = await response.json();

        document.getElementById("mensaje").innerHTML =
        "✅ Respuestas enviadas correctamente";

        document.getElementById("mensaje").style.color = "green";

        document.getElementById("formulario").reset();

    }catch(error){

        console.error(error);

        document.getElementById("mensaje").innerHTML =
        "❌ Error al enviar respuestas";

        document.getElementById("mensaje").style.color = "red";
    }

    boton.disabled = false;
    boton.innerText = "Enviar Respuestas";

});

</script>

</body>
</html>
