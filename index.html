<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Encuesta para Asesores</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    padding:40px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:15px;
    color:#222;
}

.descripcion{
    text-align:center;
    margin-bottom:30px;
    color:#555;
    line-height:1.6;
}

label{
    display:block;
    margin-top:20px;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

input,
select,
textarea{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:15px;
}

textarea{
    resize:vertical;
}

button{
    width:100%;
    margin-top:30px;
    padding:16px;
    border:none;
    border-radius:10px;
    background:#007BFF;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
}

#mensaje{
    margin-top:25px;
    text-align:center;
    font-weight:bold;
    font-size:16px;
}

</style>
</head>

<body>

<div class="container">

    <h1>Encuesta para Asesores</h1>

    <p class="descripcion">
        Queremos entender los retos reales de los asesores
        para desarrollar mejores herramientas de prospección,
        seguimiento y organización.
    </p>

    <form id="formulario">

        <label>Nombre</label>
        <input type="text" id="nombre" required>

        <label>¿Cuánto tiempo llevas como asesor?</label>
        <select id="tiempoComoAsesor" required>
            <option value="">Selecciona una opción</option>
            <option>Menos de 6 meses</option>
            <option>6 meses a 1 año</option>
            <option>1 a 3 años</option>
            <option>Más de 3 años</option>
        </select>

        <label>¿Cuál es tu mayor problema actualmente?</label>
        <select id="mayorProblema" required>
            <option value="">Selecciona una opción</option>
            <option>Conseguir prospectos</option>
            <option>Dar seguimiento</option>
            <option>Organizar clientes</option>
            <option>Hablar con prospectos</option>
            <option>Cerrar ventas</option>
            <option>Mantener constancia</option>
        </select>

        <label>¿Qué pasó después de terminar tu Proyecto 200?</label>
        <select id="quePasoProyecto200" required>
            <option value="">Selecciona una opción</option>
            <option>Me quedé sin prospectos</option>
            <option>No supe qué hacer después</option>
            <option>Perdí seguimiento</option>
            <option>Conseguí más clientes</option>
            <option>Dejé de prospectar</option>
        </select>

        <label>¿Qué herramienta usas actualmente?</label>
        <select id="herramientaActual" required>
            <option value="">Selecciona una opción</option>
            <option>Excel</option>
            <option>WhatsApp</option>
            <option>Libreta</option>
            <option>CRM</option>
            <option>Ninguna</option>
        </select>

        <label>¿Qué herramienta te ayudaría más?</label>
        <select id="herramientaDeseada" required>
            <option value="">Selecciona una opción</option>
            <option>Recordatorios automáticos</option>
            <option>Ideas para conseguir prospectos</option>
            <option>Seguimiento automático</option>
            <option>Panel de clientes</option>
            <option>Automatización de WhatsApp</option>
            <option>Capacitación práctica</option>
        </select>

        <label>Comentarios adicionales</label>
        <textarea id="comentarios" rows="5"></textarea>

        <button type="submit">
            Enviar Respuestas
        </button>

    </form>

    <div id="mensaje"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxpsLr5_qs2l1q3KH3xtcx1PzBWsRmJfTH1yXl1XuTBTmVLqNGV56xHbiqkdOhIQiuh/exec";

document.getElementById("formulario")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const boton = document.querySelector("button");
    boton.disabled = true;
    boton.innerText = "Enviando...";

    const data = {
        nombre: document.getElementById("nombre").value,
        tiempoComoAsesor: document.getElementById("tiempoComoAsesor").value,
        mayorProblema: document.getElementById("mayorProblema").value,
        quePasoProyecto200: document.getElementById("quePasoProyecto200").value,
        herramientaActual: document.getElementById("herramientaActual").value,
        herramientaDeseada: document.getElementById("herramientaDeseada").value,
        comentarios: document.getElementById("comentarios").value
    };

    try{

        const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify(data)
        });

        const result = await response.json();

        document.getElementById("mensaje").innerHTML =
            "✅ Respuestas enviadas correctamente";

        document.getElementById("mensaje").style.color = "green";

        document.getElementById("formulario").reset();

    }catch(error){

        console.error(error);

        document.getElementById("mensaje").innerHTML =
            "❌ Error al enviar respuestas";

        document.getElementById("mensaje").style.color = "red";
    }

    boton.disabled = false;
    boton.innerText = "Enviar Respuestas";

});

</script>

</body>
</html>
