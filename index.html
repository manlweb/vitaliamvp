<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzN0xaxKNzTjIMQYVpIzcQ0DQokLrkIBSl-9dyrhSAe8D6GhaSoSiFYatt6y2wAKfUe/exec";

document.getElementById("formulario").addEventListener("submit", function(e){

    e.preventDefault();

    const boton = document.querySelector("button");

    boton.disabled = true;
    boton.innerText = "Enviando...";

    const data = new FormData();

    data.append("nombre",
        document.getElementById("nombre").value);

    data.append("tiempoComoAsesor",
        document.getElementById("tiempoComoAsesor").value);

    data.append("mayorProblema",
        Array.from(
            document.querySelectorAll('input[name="mayorProblema"]:checked')
        ).map(el => el.value).join(", ")
    );

    data.append("quePasoProyecto200",
        document.getElementById("quePasoProyecto200").value);

    data.append("herramientaActual",
        Array.from(
            document.querySelectorAll('input[name="herramientaActual"]:checked')
        ).map(el => el.value).join(", ")
    );

    data.append("herramientaDeseada",
        Array.from(
            document.querySelectorAll('input[name="herramientaDeseada"]:checked')
        ).map(el => el.value).join(", ")
    );

    data.append("comentarios",
        document.getElementById("comentarios").value);

    fetch(SCRIPT_URL, {
        method: "POST",
        body: data
    })
    .then(() => {

        document.getElementById("mensaje").innerHTML =
        "✅ Respuestas enviadas correctamente";

        document.getElementById("mensaje").style.color = "green";

        document.getElementById("formulario").reset();

    })
    .catch(error => {

        console.error(error);

        document.getElementById("mensaje").innerHTML =
        "❌ Error al enviar respuestas";

        document.getElementById("mensaje").style.color = "red";

    })
    .finally(() => {

        boton.disabled = false;
        boton.innerText = "Enviar Respuestas";

    });

});

</script>
